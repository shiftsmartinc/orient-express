name: Test and publish

on:
  push:
    branches: ["**"]
    tags: ["v*"]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install dependencies
      # the cpu extra selects the lock-pinned CPU onnxruntime; GPU wheels
      # live in the cuda/tensorrt extras and never install here
      run: uv sync --frozen --extra cpu
    - name: Lint with ruff
      run: uv run --no-sync ruff check .
    - name: Check formatting with ruff
      run: uv run --no-sync ruff format --check .
    - name: Run tests with pytest
      run: uv run --no-sync pytest
    - name: Build a binary wheel and a source tarball
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(uv version --short)"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $PROJECT_VERSION" >&2
            exit 1
          fi

      - name: Build the package
        run: uv build

      - name: Upload package to PyPI
        run: uv publish --token "$UV_PUBLISH_TOKEN"
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
